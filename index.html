<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color palette Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<body>
    <div class="container">
        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate palette
        </button>

        <div class="palette-container">
            <!-- Color Box 1 -->
             <div class="color-box">
                <div class="color" style="background-color: #e2e2e2;"></div>
                <div class="color-info">
                    <span class="hex-value">#E2E2E2</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
             </div>

              <!-- Color Box 2 -->
             <div class="color-box">
                <div class="color" style="background-color: #63c5de;"></div>
                <div class="color-info">
                    <span class="hex-value">#63C5DE</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
             </div>

              <!-- Color Box 3 -->
             <div class="color-box">
                <div class="color" style="background-color: #bc3491;"></div>
                <div class="color-info">
                    <span class="hex-value">#BC3491</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
             </div>

              <!-- Color Box 4 -->
             <div class="color-box">
                <div class="color" style="background-color: #5ad384;"></div>
                <div class="color-info">
                    <span class="hex-value">#5AD384</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
             </div>

              <!-- Color Box 5 -->
             <div class="color-box">
                <div class="color" style="background-color: #3d60c8;"></div>
                <div class="color-info">
                    <span class="hex-value">#3D60C8</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
             </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
